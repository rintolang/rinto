name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install dependencies on Ubuntu-latest
      run: |
          sudo apt-get update
          sudo apt-get install libmpfr-dev libmpfr6
          g++ --version
    - name: Debug-Scanner Module
      run: make debug-scanner
    - name: Debug-Parser Module
      run: make debug-parser
    - name: Run scanner on examples
      run: |
          for f in examples/*.rin; do
            echo "--- Scanning $f ---"
            ./build/debug-scanner.out "$f"
          done
    - name: Run parser on examples
      run: |
          for f in examples/*.rin; do
            echo "--- Parsing $f ---"
            ./build/debug-parser.out "$f"
          done
