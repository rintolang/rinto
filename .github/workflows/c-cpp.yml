name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
          sudo apt-get update
          sudo apt-get install -y libmpfr-dev cppcheck valgrind
          g++ --version

    - name: Build debug-scanner
      run: make debug-scanner

    - name: Build debug-parser
      run: make debug-parser

    - name: Build test-scanner
      run: make test-scanner

    - name: Build test-parser
      run: make test-parser

    - name: Run scanner unit tests
      run: |
          set +e
          ./build/test-scanner.out 2>&1
          rc=${PIPESTATUS[0]:-$?}
          if [ $rc -ne 0 ]; then
            echo "::error::Scanner tests failed with exit code $rc"
            exit $rc
          fi

    - name: Run parser unit tests
      run: |
          set +e
          ./build/test-parser.out 2>&1
          rc=${PIPESTATUS[0]:-$?}
          if [ $rc -ne 0 ]; then
            echo "::error::Parser tests failed with exit code $rc"
            exit $rc
          fi

    - name: Run scanner on examples
      run: |
          for f in examples/*.rin; do
            echo "--- Scanning $f ---"
            ./build/debug-scanner.out "$f"
          done

    - name: Run parser on examples
      run: |
          for f in examples/*.rin; do
            echo "--- Parsing $f ---"
            ./build/debug-parser.out "$f" || true
          done

    - name: Valgrind memory leak check
      run: |
          for f in examples/*.rin; do
            echo "--- Valgrind: $f ---"
            valgrind --leak-check=full --error-exitcode=1 \
              ./build/debug-parser.out "$f" || true
          done

    - name: Static analysis with cppcheck
      run: |
          cppcheck --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            -I src/frontend -I src/debug-tools \
            src/frontend/ src/debug-tools/ \
            --error-exitcode=0
